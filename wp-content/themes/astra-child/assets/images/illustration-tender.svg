      <line x1="0" y1="20" x2="20" y2="0" stroke="#1B2A4A" stroke-width="0.3" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#lines)"/>
  <!-- Main document - tender proposal -->
