  <rect x="280" y="334" width="14" height="14" rx="2" fill="none" stroke="#1B2A4A" stroke-width="1.5" opacity="0.3"/>
  <rect x="302" y="337" width="120" height="6" rx="2" fill="#1B2A4A" opacity="0.08"/>
  <rect x="280" y="360" width="14" height="14" rx="2" fill="none" stroke="#1B2A4A" stroke-width="1.5" opacity="0.3"/>
  <rect x="302" y="363" width="135" height="6" rx="2" fill="#1B2A4A" opacity="0.08"/>
