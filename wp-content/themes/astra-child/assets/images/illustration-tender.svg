  <rect x="280" y="400" width="220" height="10" rx="5" fill="#E2E6EC"/>
  <rect x="280" y="400" width="165" height="10" rx="5" fill="#C9913B" opacity="0.7"/>
  <text x="283" y="430" font-family="Inter, sans-serif" font-size="10" fill="#1B2A4A" opacity="0.3">75% Complete</text>
