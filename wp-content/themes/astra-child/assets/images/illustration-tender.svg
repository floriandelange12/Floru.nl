  <path d="M60 60 L95 60 L95 95" stroke="#C9913B" stroke-width="2" opacity="0.2" fill="none"/>
  <path d="M740 540 L705 540 L705 505" stroke="#1B2A4A" stroke-width="2" opacity="0.12" fill="none"/>
