  <circle cx="660" cy="430" r="30" fill="none" stroke="#1B2A4A" stroke-width="1.5" opacity="0.12"/>
  <line x1="660" y1="430" x2="660" y2="410" stroke="#1B2A4A" stroke-width="1.5" opacity="0.2"/>
  <line x1="660" y1="430" x2="675" y2="435" stroke="#C9913B" stroke-width="1.5" opacity="0.3"/>
  <circle cx="660" cy="430" r="2" fill="#C9913B" opacity="0.4"/>
