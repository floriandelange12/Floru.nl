  <rect x="302" y="259" width="140" height="6" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="280" y="282" width="14" height="14" rx="2" fill="none" stroke="#C9913B" stroke-width="1.5"/>
  <path d="M283 289 L287 293 L292 285" stroke="#C9913B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="302" y="285" width="130" height="6" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="280" y="308" width="14" height="14" rx="2" fill="none" stroke="#C9913B" stroke-width="1.5"/>
  <path d="M283 315 L287 319 L292 311" stroke="#C9913B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
