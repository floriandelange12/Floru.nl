<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#F0F2F5"/>
  <defs>
    <pattern id="dots2" width="25" height="25" patternUnits="userSpaceOnUse">
      <circle cx="12.5" cy="12.5" r="0.8" fill="#1B2A4A" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#dots2)"/>
  <!-- Network visualization - stakeholders connected -->
  <!-- Central node -->
  <circle cx="400" cy="280" r="35" fill="#C9913B" opacity="0.15" stroke="#C9913B" stroke-width="2"/>
  <circle cx="400" cy="265" r="12" fill="#C9913B" opacity="0.6"/>
  <rect x="388" y="282" width="24" height="22" rx="5" fill="#C9913B" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="400" y1="280" x2="220" y2="180" stroke="#C9913B" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="280" x2="580" y2="170" stroke="#C9913B" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="280" x2="200" y2="400" stroke="#1B2A4A" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="280" x2="600" y2="420" stroke="#1B2A4A" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="280" x2="300" y2="450" stroke="#1B2A4A" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="280" x2="520" y2="460" stroke="#1B2A4A" stroke-width="1" opacity="0.15"/>
  <!-- Cross connections -->
  <line x1="220" y1="180" x2="200" y2="400" stroke="#1B2A4A" stroke-width="0.5" opacity="0.1"/>
  <line x1="580" y1="170" x2="600" y2="420" stroke="#1B2A4A" stroke-width="0.5" opacity="0.1"/>
  <!-- Stakeholder nodes - Government -->
  <circle cx="220" cy="180" r="28" fill="#1B2A4A" fill-opacity="0.08" stroke="#1B2A4A" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="207" y="165" width="26" height="20" rx="2" fill="#1B2A4A" opacity="0.2"/>
  <rect x="211" y="170" width="18" height="12" rx="1" fill="#FFFFFF" opacity="0.3"/>
  <!-- Stakeholder nodes - Military -->
  <circle cx="580" cy="170" r="28" fill="#1B2A4A" fill-opacity="0.08" stroke="#1B2A4A" stroke-width="1.5" stroke-opacity="0.3"/>
  <path d="M567 162 L580 152 L593 162 L593 180 L567 180 Z" fill="#1B2A4A" opacity="0.2"/>
  <!-- Stakeholder nodes - Industry -->
  <circle cx="200" cy="400" r="24" fill="#1B2A4A" fill-opacity="0.06" stroke="#1B2A4A" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="188" y="390" width="24" height="16" rx="2" fill="#1B2A4A" opacity="0.15"/>
  <!-- Stakeholder nodes - Procurement -->
  <circle cx="600" cy="420" r="24" fill="#1B2A4A" fill-opacity="0.06" stroke="#1B2A4A" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="588" y="412" width="24" height="16" rx="2" fill="#1B2A4A" opacity="0.15"/>
  <circle cx="300" cy="450" r="20" fill="#1B2A4A" fill-opacity="0.05" stroke="#1B2A4A" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="520" cy="460" r="20" fill="#1B2A4A" fill-opacity="0.05" stroke="#1B2A4A" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Pulsating rings around central node -->
  <circle cx="400" cy="280" r="55" fill="none" stroke="#C9913B" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="280" r="80" fill="none" stroke="#C9913B" stroke-width="0.5" opacity="0.08"/>
  <!-- Message / communication icon top-left -->
  <rect x="80" y="100" width="80" height="55" rx="6" fill="#FFFFFF" stroke="#E2E6EC" stroke-width="1"/>
  <line x1="95" y1="118" x2="145" y2="118" stroke="#1B2A4A" stroke-width="1.5" opacity="0.2"/>
  <line x1="95" y1="128" x2="140" y2="128" stroke="#1B2A4A" stroke-width="1" opacity="0.15"/>
  <line x1="95" y1="138" x2="130" y2="138" stroke="#C9913B" stroke-width="1" opacity="0.3"/>
  <!-- Handshake symbol bottom-right -->
  <path d="M650 500 C660 490 670 490 680 500 C690 490 700 490 710 500" stroke="#C9913B" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Decorative -->
  <path d="M60 50 L95 50 L95 85" stroke="#C9913B" stroke-width="2" opacity="0.2" fill="none"/>
  <path d="M740 550 L705 550 L705 515" stroke="#1B2A4A" stroke-width="2" opacity="0.12" fill="none"/>
</svg>